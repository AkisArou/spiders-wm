[workspace]
resolver = "2"
members = [
  "crates/spiders-web-bindings",
  "crates/spiders-cli",
  "crates/spiders-core",
  "crates/spiders-css",
  "crates/spiders-config",
  "crates/spiders-ipc",
  "crates/spiders-logging",
  "crates/spiders-wm",
  "crates/spiders-wm-river",
  "crates/spiders-scene",
  "crates/runtimes/js", "apps/spiders-wm-web",
]

[workspace.package]
edition = "2024"
license = "MIT OR Apache-2.0"
version = "0.1.0"
publish = false

[workspace.dependencies]
anyhow = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
tracing = "0.1"
tracing-log = "0.2"
tracing-subscriber = { version = "0.3", features = [
  "env-filter",
  "fmt",
  "ansi",
] }
