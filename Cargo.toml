[workspace]
resolver = "2"
members = [
  "crates/spider-cli",
  "crates/spider-compositor",
  "crates/spider-config",
  "crates/spider-effects",
  "crates/spider-ipc",
  "crates/spider-layout",
  "crates/spider-shared",
]

[workspace.package]
edition = "2024"
license = "MIT OR Apache-2.0"
version = "0.1.0"
publish = false

[workspace.dependencies]
anyhow = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
