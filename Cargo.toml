[workspace]
resolver = "2"
members = [
  "crates/spiders-cli",
    "crates/spiders-config",
  "crates/spiders-ipc",
  "crates/spiders-river",
  "crates/spiders-scene",
  "crates/spiders-tree",
  "crates/runtimes/js",
  "crates/spiders-shared",
]

[workspace.package]
edition = "2024"
license = "MIT OR Apache-2.0"
version = "0.1.0"
publish = false

[workspace.dependencies]
anyhow = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
